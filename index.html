<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airbnb SF Listings | CS5610</title>
  <style>
    :root {
      --red: #FF385C;
      --dark: #222;
      --light: #f7f7f7;
      --gray: #717171;
      --border: #ddd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--light); color: var(--dark); }

    /* NAVBAR */
    nav {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { color: var(--red); font-size: 1.6rem; font-weight: bold; }
    .nav-right { color: var(--gray); font-size: 0.9rem; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #FF385C, #bd1e59);
      padding: 80px 40px;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 60%),
                  radial-gradient(circle at 70% 30%, rgba(255,255,255,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }
    .hero h1 span { 
      text-decoration: underline;
      text-decoration-color: rgba(255,255,255,0.5);
      text-underline-offset: 6px;
    }
    .hero p {
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 560px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .hero-stat {
      text-align: center;
    }
    .hero-stat .number {
      font-size: 1.8rem;
      font-weight: 700;
      display: block;
    }
    .hero-stat .label {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    /* CONTROLS */
    .controls {
      max-width: 1200px;
      margin: 30px auto 12px;
      padding: 0 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls input, .controls select {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
      background: white;
    }
    .controls input { flex: 1; min-width: 200px; }
    .controls input:focus, .controls select:focus { border-color: var(--red); }

    /* STATS */
    .stats {
      max-width: 1200px;
      margin: 0 auto 16px;
      padding: 0 24px;
      color: var(--gray);
      font-size: 0.9rem;
    }

    /* GRID */
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .card-img { width: 100%; height: 200px; object-fit: cover; }
    .card-img-placeholder {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, #FF385C22, #FF385C55);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }

    .card-body { padding: 16px; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .card-title {
      font-size: 0.95rem; font-weight: 600; flex: 1;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .badge {
      background: var(--red); color: white;
      font-size: 0.7rem; padding: 2px 8px;
      border-radius: 12px; font-weight: 600;
      white-space: nowrap; margin-left: 8px;
    }
    .card-neighborhood { font-size: 0.8rem; color: var(--gray); margin-bottom: 6px; }
    .card-desc {
      font-size: 0.82rem; color: var(--gray);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px;
    }
    .host { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .host-img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: #eee; }
    .host-name { font-size: 0.82rem; color: var(--gray); }
    .amenities { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .amenity-tag { background: #f0f0f0; border-radius: 12px; padding: 2px 8px; font-size: 0.72rem; color: var(--gray); }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .price { font-size: 1rem; font-weight: 700; }
    .price span { font-weight: 400; color: var(--gray); font-size: 0.82rem; }
    .rating { font-size: 0.82rem; color: var(--gray); }
    .star { color: var(--red); }

    .loading { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--gray); }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #eee; border-top: 4px solid var(--red);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 32px;
      max-width: 620px; width: 90%; max-height: 85vh;
      overflow-y: auto; position: relative;
    }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.4rem; cursor: pointer; }
    .modal img.modal-thumb { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; }
    .modal h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .modal .modal-meta { color: var(--gray); font-size: 0.85rem; margin-bottom: 12px; }
    .modal .modal-desc { font-size: 0.88rem; color: #444; line-height: 1.6; margin-bottom: 16px; }
    .modal .modal-host { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .modal .modal-price { font-size: 1.3rem; font-weight: 700; color: var(--red); margin-bottom: 16px; }
    .modal .modal-amenities { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .modal .modal-link {
      display: inline-block; background: var(--red); color: white;
      padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">airbnb</div>
    <div class="nav-right">SF Listings · CS5610 · Smitkumar Velani</div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>Find Your Perfect Stay in <span>San Francisco</span></h1>
    <p>Don't just visit San Francisco — live it. Browse 50 handpicked stays across the city's most iconic neighborhoods.</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <span class="number">50</span>
        <span class="label">Listings</span>
      </div>
      <div class="hero-stat">
        <span class="number">20+</span>
        <span class="label">Neighborhoods</span>
      </div>
      <div class="hero-stat">
        <span class="number">4.8★</span>
        <span class="label">Avg Rating</span>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <input type="text" id="search" placeholder="🔍 Search by name or neighborhood..." oninput="filterListings()" />
    <select id="sort" onchange="filterListings()">
      <option value="">Sort by</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="rating">Top Rated</option>
      <option value="name">Name A–Z</option>
    </select>
    <select id="room-filter" onchange="filterListings()">
      <option value="">All Room Types</option>
      <option value="Entire home/apt">Entire Home</option>
      <option value="Private room">Private Room</option>
    </select>
  </div>

  <div class="stats" id="stats"></div>

  <div class="grid" id="grid">
    <div class="loading">
      <div class="spinner"></div>
      Loading SF listings...
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    let allListings = [];
    let filtered = [];

    function getPriceBadge(price) {
      const p = parseFloat((price || "0").replace(/[$,]/g, "")) || 0;
      if (p < 100) return "💚 Budget";
      if (p < 200) return "⭐ Popular";
      if (p < 350) return "✨ Premium";
      return "👑 Luxury";
    }

    function stripHtml(html) {
      return html ? html.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim() : "";
    }

    function parsePrice(price) {
      return parseFloat((price || "0").replace(/[$,]/g, "")) || 0;
    }

    function parseAmenities(amenities) {
      try {
        if (Array.isArray(amenities)) return amenities;
        if (typeof amenities === "string") return JSON.parse(amenities);
        return [];
      } catch (e) { return []; }
    }

    async function loadListings() {
      try {
        const res = await fetch("airbnb_sf_listings_500.json");
        const data = await res.json();
        allListings = data.slice(0, 50);
        filtered = [...allListings];
        renderListings(filtered);
      } catch (err) {
        document.getElementById("grid").innerHTML =
          `<div class="loading">❌ Could not load JSON. Make sure airbnb_sf_listings_500.json is in the same folder.</div>`;
      }
    }

    function renderListings(listings) {
      const grid = document.getElementById("grid");
      const stats = document.getElementById("stats");
      stats.textContent = `Showing ${listings.length} of 50 San Francisco listings`;

      if (!listings.length) {
        grid.innerHTML = `<div class="loading">No listings found.</div>`;
        return;
      }

      grid.innerHTML = listings.map((l, i) => {
        const name = l.name || "Unnamed Listing";
        const desc = stripHtml(l.description || "");
        const price = l.price || "N/A";
        const hostName = l.host_name || "Unknown Host";
        const hostImg = l.host_thumbnail_url || "";
        const thumbnail = l.picture_url || "";
        const neighborhood = l.neighbourhood_cleansed || "";
        const rating = l.review_scores_rating || "";
        const roomType = l.room_type || "";
        const amenities = parseAmenities(l.amenities).slice(0, 4);

        return `
          <div class="card" onclick="openModal(${i})">
            ${thumbnail
              ? `<img class="card-img" src="${thumbnail}" alt="${name}" loading="lazy" />`
              : `<div class="card-img-placeholder">🏠</div>`}
            <div class="card-body">
              <div class="card-top">
                <div class="card-title">${name}</div>
                <span class="badge">${getPriceBadge(price)}</span>
              </div>
              <div class="card-neighborhood">📍 ${neighborhood} · ${roomType}</div>
              <div class="card-desc">${desc}</div>
              <div class="host">
                ${hostImg ? `<img class="host-img" src="${hostImg}" alt="${hostName}" />` : `<div class="host-img"></div>`}
                <span class="host-name">Hosted by ${hostName}</span>
              </div>
              <div class="amenities">
                ${amenities.map(a => `<span class="amenity-tag">${a}</span>`).join("")}
              </div>
              <div class="card-footer">
                <div class="price">${price} <span>/ night</span></div>
                <div class="rating"><span class="star">★</span> ${rating}</div>
              </div>
            </div>
          </div>`;
      }).join("");
    }

    function filterListings() {
      const search = document.getElementById("search").value.toLowerCase().trim();
      const sort = document.getElementById("sort").value;
      const roomFilter = document.getElementById("room-filter").value;

      filtered = allListings.filter(function(l) {
        const name = (l.name || "").toLowerCase();
        const hood = (l.neighbourhood_cleansed || "").toLowerCase();
        const matchSearch = !search || name.includes(search) || hood.includes(search);
        const matchRoom = !roomFilter || l.room_type === roomFilter;
        return matchSearch && matchRoom;
      });

      if (sort === "price-asc") filtered.sort((a, b) => parsePrice(a.price) - parsePrice(b.price));
      else if (sort === "price-desc") filtered.sort((a, b) => parsePrice(b.price) - parsePrice(a.price));
      else if (sort === "rating") filtered.sort((a, b) => (b.review_scores_rating || 0) - (a.review_scores_rating || 0));
      else if (sort === "name") filtered.sort((a, b) => (a.name || "").localeCompare(b.name || ""));

      renderListings(filtered);
    }

    function openModal(i) {
      const l = filtered[i];
      const desc = stripHtml(l.description || "No description.");
      const price = l.price || "N/A";
      const hostName = l.host_name || "Unknown";
      const hostImg = l.host_thumbnail_url || "";
      const thumbnail = l.picture_url || "";
      const rating = l.review_scores_rating || "N/A";
      const amenities = parseAmenities(l.amenities).slice(0, 12);

      document.getElementById("modal-content").innerHTML = `
        ${thumbnail ? `<img class="modal-thumb" src="${thumbnail}" alt="${l.name}" />` : ""}
        <h2>${l.name || "Listing"}</h2>
        <div class="modal-meta">📍 ${l.neighbourhood_cleansed || ""} · ${l.room_type || ""} · ★ ${rating}</div>
        <div class="modal-price">${price} <span style="font-weight:400;font-size:0.9rem;color:#717171">/ night</span></div>
        <div class="modal-host">
          ${hostImg ? `<img class="host-img" src="${hostImg}" style="width:36px;height:36px;border-radius:50%;object-fit:cover" />` : ""}
          <span>Hosted by <strong>${hostName}</strong></span>
        </div>
        <div class="modal-desc">${desc.slice(0, 500)}${desc.length > 500 ? "..." : ""}</div>
        <div class="modal-amenities">
          ${amenities.map(a => `<span class="amenity-tag">${a}</span>`).join("")}
        </div>
        ${l.listing_url ? `<a class="modal-link" href="${l.listing_url}" target="_blank">View on Airbnb →</a>` : ""}
      `;
      document.getElementById("modal-overlay").classList.add("active");
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById("modal-overlay")) {
        document.getElementById("modal-overlay").classList.remove("active");
      }
    }

    loadListings();
  </script>
</body>
</html>
